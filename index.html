<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Birthday Greeting Card</title>
<style>
    body {
        font-family: 'Comic Sans MS', cursive, sans-serif;
        background: linear-gradient(135deg, #ffafbd, #ffc3a0);
        text-align: center;
        padding: 20px;
    }

    .card {
        background: white;
        border-radius: 20px;
        padding: 20px;
        max-width: 400px;
        margin: auto;
        box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
        position: relative;
        animation: popIn 1s ease;
    }

    h1 {
        color: #ff69b4;
        font-size: 2em;
        margin-bottom: 10px;
    }

    .balloons {
        font-size: 2em;
        animation: float 2s infinite ease-in-out alternate;
    }

    .card-image {
        width: 100%;
        max-width: 250px;
        border-radius: 15px;
        margin: 15px 0;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .message {
        font-size: 1.2em;
        color: #555;
        margin: 15px 0;
    }

    input {
        padding: 10px;
        font-size: 1em;
        border-radius: 10px;
        border: none;
        outline: none;
    }

    button {
        padding: 10px 20px;
        margin-top: 10px;
        background: #ff69b4;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }

    button:hover {
        background: #ff1493;
    }

    @keyframes popIn {
        from { transform: scale(0.8); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }

    @keyframes float {
        from { transform: translateY(0); }
        to { transform: translateY(-10px); }
    }
</style>
</head>
<body>

<div class="card">
    <div class="balloons">🎈🎉🎂</div>
    <h1>Happy Birthday!</h1>

    <!-- Your uploaded image -->
    <img src="1000000408.jpg" alt="Birthday Character" class="card-image">

    <div class="message" id="greetingMessage">Wishing you the happiest birthday ever!</div>
    <input type="text" id="nameInput" placeholder="Enter your name" />
    <button onclick="updateMessage()">Personalize</button>
</div>

<script>
    function updateMessage() {
        const name = document.getElementById("nameInput").value.trim();
        const messageEl = document.getElementById("greetingMessage");
        if (name) {
            messageEl.textContent = `Happy Birthday, ${name}! 🎉🎂🎈`;
        } else {
            messageEl.textContent = "Wishing you the happiest birthday ever!";
        }
    }
</script>

</body>
</html>
